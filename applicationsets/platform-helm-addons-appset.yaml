apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-helm-addons
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/abrahamberg/fleet-gitops.git
              revision: main
              files:
                - path: clusters/*.yaml
          - list:
              elements:
                - addon: cert-manager
                  namespace: cert-manager
                  chart: cert-manager
                  repoURL: https://charts.jetstack.io
                  targetRevision: v1.15.3
                  syncWave: "1"
                - addon: ingress-nginx
                  namespace: ingress-system
                  chart: ingress-nginx
                  repoURL: https://kubernetes.github.io/ingress-nginx
                  targetRevision: 4.11.2
                  syncWave: "2"
                - addon: external-secrets
                  namespace: external-secrets
                  chart: external-secrets
                  repoURL: https://charts.external-secrets.io
                  targetRevision: 0.10.4
                  syncWave: "3"
                - addon: metrics-server
                  namespace: kube-system
                  chart: metrics-server
                  repoURL: https://kubernetes-sigs.github.io/metrics-server
                  targetRevision: 3.12.1
                  syncWave: "3"
                - addon: kube-prometheus-stack
                  namespace: observability
                  chart: kube-prometheus-stack
                  repoURL: https://prometheus-community.github.io/helm-charts
                  targetRevision: 61.7.2
                  syncWave: "4"
                - addon: kyverno
                  namespace: kyverno
                  chart: kyverno
                  repoURL: https://kyverno.github.io/kyverno
                  targetRevision: 3.2.6
                  syncWave: "5"
  template:
    metadata:
      name: '{{name}}-{{addon}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{syncWave}}'
      labels:
        environment: '{{environment}}'
        platform-addon: '{{addon}}'
        region: '{{region}}'
    spec:
      project: default
      source:
        repoURL: '{{repoURL}}'
        chart: '{{chart}}'
        targetRevision: '{{targetRevision}}'
        helm:
          releaseName: '{{addon}}'
          parameters:
            - name: installCRDs
              value: "true"
      destination:
        server: '{{server}}'
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true