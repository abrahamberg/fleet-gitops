apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-helm-addons
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/abrahamberg/fleet-gitops.git
              revision: main
              files:
                - path: clusters/*.yaml
          - list:
              elements:
                - addon: cert-manager
                  namespace: cert-manager
                  chart: cert-manager
                  repoURL: https://charts.jetstack.io
                  targetRevision: v1.15.3
                  syncWave: "1"
                  values: |-
                    installCRDs: true
                - addon: ingress-nginx
                  namespace: ingress-system
                  chart: ingress-nginx
                  repoURL: https://kubernetes.github.io/ingress-nginx
                  targetRevision: 4.11.2
                  syncWave: "2"
                  values: ""
                - addon: argo-rollouts
                  namespace: argo-rollouts
                  chart: argo-rollouts
                  repoURL: https://argoproj.github.io/argo-helm
                  targetRevision: 2.41.0
                  syncWave: "3"
                  values: ""
                - addon: external-secrets
                  namespace: external-secrets
                  chart: external-secrets
                  repoURL: https://charts.external-secrets.io
                  targetRevision: 0.10.4
                  syncWave: "4"
                  values: |-
                    installCRDs: true
                - addon: metrics-server
                  namespace: kube-system
                  chart: metrics-server
                  repoURL: https://kubernetes-sigs.github.io/metrics-server
                  targetRevision: 3.12.1
                  syncWave: "4"
                  values: |-
                    args:
                      - --kubelet-insecure-tls
                - addon: kube-prometheus-stack
                  namespace: observability
                  chart: kube-prometheus-stack
                  repoURL: https://prometheus-community.github.io/helm-charts
                  targetRevision: 61.7.2
                  syncWave: "5"
                  values: |-
                    grafana:
                      enabled: false
                - addon: kyverno
                  namespace: kyverno
                  chart: kyverno
                  repoURL: https://kyverno.github.io/kyverno
                  targetRevision: 3.2.6
                  syncWave: "6"
                  values: ""
  template:
    metadata:
      name: '{{ .name }}-{{ .addon }}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{ .syncWave }}'
      labels:
        environment: '{{ .environment }}'
        platform-addon: '{{ .addon }}'
        region: '{{ .region }}'
    spec:
      project: fleet-platform
      source:
        repoURL: '{{ .repoURL }}'
        chart: '{{ .chart }}'
        targetRevision: '{{ .targetRevision }}'
        helm:
          releaseName: '{{ .addon }}'
          values: |-
            {{ .values | nindent 12 }}
      destination:
        server: '{{ .server }}'
        namespace: '{{ .namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true