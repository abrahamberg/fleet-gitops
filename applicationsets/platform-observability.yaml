apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-loki
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
  labels:
    platform-addon: loki
    platform-scope: management-cluster
spec:
  project: fleet-platform
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.12.0
    helm:
      releaseName: loki
      values: |-
        deploymentMode: SingleBinary

        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          useTestSchema: true

        singleBinary:
          replicas: 1
          persistence:
            enabled: true
            size: 10Gi

        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0

        gateway:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "11"
  labels:
    platform-addon: grafana
    platform-scope: management-cluster
spec:
  project: fleet-platform
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 8.5.12
    helm:
      releaseName: grafana
      values: |-
        replicas: 1

        service:
          type: ClusterIP

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Loki
                type: loki
                access: proxy
                url: http://loki-gateway.observability.svc.cluster.local
                isDefault: true

        sidecar:
          dashboards:
            enabled: true
            searchNamespace: ALL
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true