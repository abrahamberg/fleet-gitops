apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: guestbook-fleet
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/abrahamberg/fleet-gitops.git
        revision: main
        files:
          - path: clusters/*.yaml
  template:
    metadata:
      name: '{{name}}-guestbook'
    spec:
      project: fleet-platform
      source:
        repoURL: https://github.com/abrahamberg/fleet-gitops.git
        targetRevision: main
        path: examples/guestbook-rollout
      destination:
        server: '{{server}}'
        namespace: guestbook
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
